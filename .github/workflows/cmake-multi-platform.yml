name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      # Two Linux legs on purpose: "system" consumes distro packages through
      # find_package, "fetchcontent" builds every dependency from the pinned
      # archives, so both resolution paths stay tested.
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            deps: system
            build_type: Release
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            deps: fetchcontent
            build_type: Release
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            deps: fetchcontent
            build_type: Release
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            deps: system
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (Linux)
        if: runner.os == 'Linux' && matrix.deps == 'system'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglew-dev libglfw3-dev libglm-dev libtinyobjloader-dev

      - name: Install build prerequisites (Linux, FetchContent)
        if: runner.os == 'Linux' && matrix.deps == 'fetchcontent'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorg-dev libglu1-mesa-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev

      - name: Install system packages (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install glfw glew glm

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ matrix.c_compiler }}-${{ matrix.deps }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
